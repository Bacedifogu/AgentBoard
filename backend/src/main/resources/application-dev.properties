spring.application.name=AgentBoard

spring.datasource.url=jdbc:postgresql://localhost:5432/agentboard
spring.datasource.username=agentboard
spring.datasource.password=agentboard
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

server.port=8080

logging.level.org.springframework.security=DEBUG
logging.level.com.agentboard=DEBUG

jwt.secret=dev-secret-key-that-should-be-at-least-256-bits-long-for-hs256
jwt.expiration=86400000
