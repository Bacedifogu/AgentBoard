spring.application.name=AgentBoard

spring.datasource.url=jdbc:postgresql://postgres:5432/agentboard
spring.datasource.username=agentboard
spring.datasource.password=agentboard
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

server.port=8080

logging.level.org.springframework.security=INFO
logging.level.com.agentboard=INFO

jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:-86400000}
