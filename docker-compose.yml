services:
  postgres:
    image: postgres:16-alpine
    container_name: agentboard-db
    environment:
      POSTGRES_DB: agentboard
      POSTGRES_USER: agentboard
      POSTGRES_PASSWORD: agentboard
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentboard"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: agentboard-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/agentboard
      SPRING_DATASOURCE_USERNAME: agentboard
      SPRING_DATASOURCE_PASSWORD: agentboard
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400000}
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: agentboard-web
    depends_on:
      - backend
    ports:
      - "4200:80"
    environment:
      API_URL: http://backend:8080

volumes:
  postgres_data:
